name: Docker Publish

on:
  push:
    tags:
      - "*"

permissions:
  contents: read

jobs:
  publish:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Extract tag value
        id: vars
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Compute image name
        id: image
        run: |
          if [ -n "${{ vars.DOCKERHUB_REPOSITORY }}" ]; then
            echo "name=${{ vars.DOCKERHUB_REPOSITORY }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ vars.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.vars.outputs.tag }}
            ${{ steps.image.outputs.name }}:latest
