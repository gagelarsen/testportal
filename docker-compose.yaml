version: '3.7'
services:
  db:
    image: postgres:latest
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-testportal}
      POSTGRES_USER: ${DB_USER:-testportal}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-testportal}
      
  server:
    build: .
    depends_on:
      - db
    image: testportal
    restart: always
    ports:
      - "8000:8000"
    environment:
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      DB_USER: ${DB_USER:-testportal}
      DB_PASSWORD: ${DB_PASSWORD:-testportal}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-env}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-testportal}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8000}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:8000}