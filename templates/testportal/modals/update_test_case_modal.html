{% load static %}

<div class="modal fade" id="update-test-case-modal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="update-test-case-modal-title">Update Test Case</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div id="update-test-case-modal-loading" class="tp-modal-loading">
          <img class="div-centered" id="update-result-modal-loading-gif" src="{% static 'testportal/images/loading.gif' %}">
          <p class="text-secondary small mb-0 mt-2">Loading test case...</p>
        </div>

        <form id="update-test-case-modal-form" enctype="multipart/form-data" method="post" name="upload-result-form" class="tp-modal-form">
          <input type="hidden" id="test-case-id" class="form-control">

          <div class="row g-3">
            <div class="col-12 col-md-6">
              <label for="test-case-name" class="form-label">Name</label>
              <input type="text" id="test-case-name" class="form-control">
            </div>
            <div class="col-12 col-md-6">
              <label for="test-case-test-id" class="form-label">Test ID</label>
              <input type="text" id="test-case-test-id" class="form-control">
            </div>
          </div>

          <div class="row g-3 mt-0">
            <div class="col-12 col-md-6">
              <label for="test-case-suite" class="form-label">Suite</label>
              <select id="test-case-suite" class="form-select">
                {% for s in suites %}<option value="{{ s.id }}">{{ s.name }}</option>{% endfor %}
              </select>
            </div>
            <div class="col-12 col-md-3">
              <label for="test-case-status" class="form-label">Status</label>
              <select id="test-case-status" class="form-select"{% if not user.is_authenticated %} disabled{% endif %}>
                <option value="active">Active</option>
                <option value="depricated">Depricated</option>
                <option value="broken">Broken</option>
                <option value="under-construction">Under Construction</option>
                <option value="design">In Design</option>
              </select>
            </div>
            <div class="col-12 col-md-3">
              <label for="test-case-type" class="form-label">Type</label>
              <select id="test-case-type" class="form-select"{% if not user.is_authenticated %} disabled{% endif %}>
                <option value="automated">Automated</option>
                <option value="manual">Manual</option>
              </select>
            </div>
          </div>

          <div class="row g-3 mt-0">
            <div class="col-12 col-md-6">
              <label for="test-case-tags" class="form-label">Tags</label>
              <select id="test-case-tags" multiple class="form-select">
                {% for tag in tags %}<option value="{{ tag.id }}">{{ tag.tag }}</option>{% endfor %}
              </select>
            </div>
            <div class="col-12 col-md-6">
              <label for="test-plans" class="form-label">Test Plan</label>
              <select id="test-plans" class="form-select">
                {% for test_plan in test_plans %}<option value="{{ test_plan.id }}">{{ test_plan.name }} - {{ test_plan.suite }}</option>{% endfor %}
              </select>
            </div>
          </div>

          <div class="row g-3 mt-0">
            <div class="col-12 col-md-6">
              <label for="test-case-categories" class="form-label">Category</label>
              <select id="test-case-categories" class="form-select">
                {% for category in categories %}<option value="{{ category.id }}">{{ category.category }}</option>{% endfor %}
              </select>
            </div>
            <div class="col-12 col-md-6">
              <label for="test-case-subcategories" class="form-label">Subcategory</label>
              <select id="test-case-subcategories" class="form-select">
                {% for subcategory in subcategories %}<option value="{{ subcategory.id }}">{{ subcategory.subcategory }}</option>{% endfor %}
              </select>
            </div>
          </div>

          <div class="mt-3">
            <label class="form-label">Steps</label>
            <div class="tp-md-editor">
              <!-- Toolbar -->
              <div class="tp-md-toolbar" id="steps-md-toolbar">
                <button type="button" class="tp-md-btn" data-md-action="bold" title="Bold"><i class="bi bi-type-bold"></i></button>
                <button type="button" class="tp-md-btn" data-md-action="italic" title="Italic"><i class="bi bi-type-italic"></i></button>
                <button type="button" class="tp-md-btn" data-md-action="strike" title="Strikethrough"><i class="bi bi-type-strikethrough"></i></button>
                <span class="tp-md-divider"></span>
                <button type="button" class="tp-md-btn" data-md-action="h1" title="Heading 1">H1</button>
                <button type="button" class="tp-md-btn" data-md-action="h2" title="Heading 2">H2</button>
                <button type="button" class="tp-md-btn" data-md-action="h3" title="Heading 3">H3</button>
                <span class="tp-md-divider"></span>
                <button type="button" class="tp-md-btn" data-md-action="ul" title="Bullet list"><i class="bi bi-list-ul"></i></button>
                <button type="button" class="tp-md-btn" data-md-action="ol" title="Numbered list"><i class="bi bi-list-ol"></i></button>
                <span class="tp-md-divider"></span>
                <button type="button" class="tp-md-btn" data-md-action="code" title="Inline code"><i class="bi bi-code"></i></button>
                <button type="button" class="tp-md-btn" data-md-action="codeblock" title="Code block"><i class="bi bi-code-square"></i></button>
                <button type="button" class="tp-md-btn" data-md-action="link" title="Link"><i class="bi bi-link-45deg"></i></button>
                <button type="button" class="tp-md-btn" data-md-action="hr" title="Horizontal rule"><i class="bi bi-dash-lg"></i></button>
                <span class="flex-grow-1"></span>
                <div class="tp-md-tabs" role="group">
                  <button type="button" class="tp-md-tab-btn active" id="steps-tab-edit">Edit</button>
                  <button type="button" class="tp-md-tab-btn" id="steps-tab-preview">Preview</button>
                </div>
              </div>
              <!-- Editor -->
              <textarea class="form-control tp-md-textarea" id="test-case-steps" rows="12"{% if not user.is_authenticated %} disabled{% endif %}></textarea>
              <!-- Preview -->
              <div class="tp-md-preview tp-prose" id="steps-preview" style="display:none;"></div>
            </div>
          </div>
        </form>

        <div id="update-error" style="display: none;" class="alert alert-danger py-2 mt-3" role="alert"></div>
      </div>
      <div class="modal-footer">
        <a id="view-test-case-button" type="button" href="/" class="btn btn-success">View</a>
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" id="update-test-case-modal-accept">Update</button>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  function initMdEditor() {
    var textarea = document.getElementById('test-case-steps');
    var preview  = document.getElementById('steps-preview');
    var tabEdit  = document.getElementById('steps-tab-edit');
    var tabPrev  = document.getElementById('steps-tab-preview');
    if (!textarea) { return; }

    // Tab switching
    tabEdit.addEventListener('click', function() {
      textarea.style.display = '';
      preview.style.display  = 'none';
      tabEdit.classList.add('active');
      tabPrev.classList.remove('active');
    });
    tabPrev.addEventListener('click', function() {
      preview.innerHTML = (typeof marked !== 'undefined')
        ? marked.parse(textarea.value || '')
        : '<pre>' + (textarea.value || '') + '</pre>';
      textarea.style.display = 'none';
      preview.style.display  = '';
      tabEdit.classList.remove('active');
      tabPrev.classList.add('active');
    });

    // Toolbar actions
    document.getElementById('steps-md-toolbar').addEventListener('click', function(e) {
      var btn = e.target.closest('[data-md-action]');
      if (!btn || textarea.disabled) { return; }
      var action = btn.getAttribute('data-md-action');
      var start  = textarea.selectionStart;
      var end    = textarea.selectionEnd;
      var sel    = textarea.value.slice(start, end);
      var before = textarea.value.slice(0, start);
      var after  = textarea.value.slice(end);
      var nl     = (before.length && before[before.length - 1] !== '\n') ? '\n' : '';

      var replace, cursor;

      if (action === 'bold')      { replace = '**' + (sel || 'bold text')     + '**';  cursor = sel ? end + 4 : start + 2; }
      else if (action === 'italic')    { replace = '*'  + (sel || 'italic text')   + '*';   cursor = sel ? end + 2 : start + 1; }
      else if (action === 'strike')    { replace = '~~' + (sel || 'strikethrough') + '~~';  cursor = sel ? end + 4 : start + 2; }
      else if (action === 'h1')        { replace = nl + '# '   + (sel || 'Heading 1'); cursor = replace.length + before.length; }
      else if (action === 'h2')        { replace = nl + '## '  + (sel || 'Heading 2'); cursor = replace.length + before.length; }
      else if (action === 'h3')        { replace = nl + '### ' + (sel || 'Heading 3'); cursor = replace.length + before.length; }
      else if (action === 'ul') {
        replace = sel
          ? sel.split('\n').map(function(l){ return '- ' + l; }).join('\n')
          : nl + '- List item';
        cursor = before.length + replace.length;
      }
      else if (action === 'ol') {
        replace = sel
          ? sel.split('\n').map(function(l, i){ return (i+1) + '. ' + l; }).join('\n')
          : nl + '1. List item';
        cursor = before.length + replace.length;
      }
      else if (action === 'code')      { replace = '`'  + (sel || 'code') + '`';   cursor = sel ? end + 2 : start + 1; }
      else if (action === 'codeblock') { replace = nl + '```\n' + (sel || 'code') + '\n```'; cursor = before.length + replace.length; }
      else if (action === 'link')      { replace = '[' + (sel || 'link text') + '](url)'; cursor = before.length + replace.length - 1; }
      else if (action === 'hr')        { replace = nl + '\n---\n'; cursor = before.length + replace.length; }

      if (replace != null) {
        textarea.focus();
        textarea.value = before + replace + after;
        textarea.setSelectionRange(cursor, cursor);
        textarea.dispatchEvent(new Event('input'));
      }
    });

    // Reset to Edit tab when modal opens
    document.getElementById('update-test-case-modal').addEventListener('show.bs.modal', function() {
      tabEdit.click();
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initMdEditor);
  } else {
    initMdEditor();
  }
})();
</script>
