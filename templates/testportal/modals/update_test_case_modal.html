{% load static %}

<div class="modal fade" id="update-test-case-modal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="update-test-case-modal-title">Update Test Case</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div id="update-test-case-modal-loading" class="tp-modal-loading">
          <img class="div-centered" id="update-result-modal-loading-gif" src="{% static 'testportal/images/loading.gif' %}">
          <p class="text-secondary small mb-0 mt-2">Loading test case...</p>
        </div>

        <form id="update-test-case-modal-form" enctype="multipart/form-data" method="post" name="upload-result-form" class="tp-modal-form">
          <input type="hidden" id="test-case-id" class="form-control">

          <div class="row g-3">
            <div class="col-12 col-md-6">
              <label for="test-case-name" class="form-label">Name</label>
              <input type="text" id="test-case-name" class="form-control">
            </div>
            <div class="col-12 col-md-6">
              <label for="test-case-test-id" class="form-label">Test ID</label>
              <input type="text" id="test-case-test-id" class="form-control">
            </div>
          </div>

          <div class="row g-3 mt-0">
            <div class="col-12 col-md-6">
              <label for="test-case-suite" class="form-label">Suite</label>
              <select id="test-case-suite" class="form-select" disabled>
                <option value="{{ suite.id }}">{{ suite.name }}</option>
              </select>
            </div>
            <div class="col-12 col-md-3">
              <label for="test-case-status" class="form-label">Status</label>
              <select id="test-case-status" class="form-select"{% if not user.is_authenticated %} disabled{% endif %}>
                <option value="active">Active</option>
                <option value="depricated">Depricated</option>
                <option value="broken">Broken</option>
                <option value="under-construction">Under Construction</option>
                <option value="design">In Design</option>
              </select>
            </div>
            <div class="col-12 col-md-3">
              <label for="test-case-type" class="form-label">Type</label>
              <select id="test-case-type" class="form-select"{% if not user.is_authenticated %} disabled{% endif %}>
                <option value="automated">Automated</option>
                <option value="manual">Manual</option>
              </select>
            </div>
          </div>

          <div class="row g-3 mt-0">
            <div class="col-12 col-md-6">
              <label for="test-case-tags" class="form-label">Tags</label>
              <select id="test-case-tags" multiple class="form-select">
                {% for tag in tags %}<option value="{{ tag.id }}">{{ tag.tag }}</option>{% endfor %}
              </select>
            </div>
            <div class="col-12 col-md-6">
              <label for="test-plans" class="form-label">Test Plan</label>
              <select id="test-plans" class="form-select">
                {% for test_plan in test_plans %}<option value="{{ test_plan.id }}">{{ test_plan.name }} - {{ test_plan.suite }}</option>{% endfor %}
              </select>
            </div>
          </div>

          <div class="row g-3 mt-0">
            <div class="col-12 col-md-6">
              <label for="test-case-categories" class="form-label">Category</label>
              <select id="test-case-categories" class="form-select">
                {% for category in categories %}<option value="{{ category.id }}">{{ category.category }}</option>{% endfor %}
              </select>
            </div>
            <div class="col-12 col-md-6">
              <label for="test-case-subcategories" class="form-label">Subcategory</label>
              <select id="test-case-subcategories" class="form-select">
                {% for subcategory in subcategories %}<option value="{{ subcategory.id }}">{{ subcategory.subcategory }}</option>{% endfor %}
              </select>
            </div>
          </div>

          <div class="mt-3">
            <label for="test-case-steps" class="form-label">Steps</label>
            <textarea class="form-control" id="test-case-steps" rows="9"{% if not user.is_authenticated %} disabled{% endif %}></textarea>
          </div>
        </form>

        <div id="update-error" style="display: none;" class="alert alert-danger py-2 mt-3" role="alert"></div>
      </div>
      <div class="modal-footer">
        <a id="view-test-case-button" type="button" href="/" class="btn btn-success">View</a>
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" id="update-test-case-modal-accept">Update</button>
      </div>
    </div>
  </div>
</div>
