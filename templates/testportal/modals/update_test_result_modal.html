{% load static %}
<div class="modal fade" id="update-result-modal" tabindex="-1" aria-labelledby="update-result-modal-label" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="update-result-modal-lable">Update Result</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div id="update-result-modal-body" class="modal-body">
        <div id="update-result-modal-body-content">
          <div id="update-result-modal-loading" class="tp-modal-loading">
            <img class="div-centered" id="update-result-modal-loading-gif" src="{% static 'testportal/images/loading.gif' %}">
            <p class="text-secondary small mb-0 mt-2">Loading result details...</p>
          </div>

          <form id="update-result-modal-form" class="tp-modal-form">
            <input id="test-result-test-case" type="hidden" disabled>
            <input id="test-result-test-case-id" type="hidden" disabled>
            <input id="test-result-id" type="hidden" disabled>

            <div class="row g-3">
              <div class="col-12 col-sm-6">
                <label for="test-result-date" class="form-label">Date</label>
                <input readonly class="form-control" type="date" id="test-result-date" name="result-date" value="2022-01-01" min="2022-01-01" max="2122-12-31"{% if not user.is_authenticated %} disabled{% endif %}>
              </div>
              <div class="col-12 col-sm-6">
                <label for="test-result-status" class="form-label">Status</label>
                <select id="test-result-status" class="form-select"{% if not user.is_authenticated %} disabled{% endif %}>
                  {% for status in statuses %}
                  <option value={{ status.0 }}>{{ status.1 }}</option>
                  {% endfor %}
                </select>
              </div>
            </div>

            <div class="row g-3 mt-0">
              <div class="col-12 col-sm-6">
                <label for="test-result-user" class="form-label">User</label>
                <select id="test-result-user" class="form-select"{% if not user.is_authenticated %} disabled{% endif %}>
                  {% for user in users %}
                  <option value={{ user.id }}>{{ user.username }}</option>
                  {% endfor %}
                </select>
              </div>
              <div class="col-12 col-sm-6">
                <label for="test-result-duration" class="form-label">Duration (seconds)</label>
                <input id="test-result-duration" class="form-control" type="text" disabled>
              </div>
            </div>

            <div class="mt-3">
              <label for="test-result-bug-id" class="form-label">Bug ID</label>
              <input id="test-result-bug-id" class="form-control" type="text" placeholder="Optional bug id">
            </div>

            <div class="mt-3">
              <label for="test-result-note" class="form-label">Note</label>
              <textarea class="form-control" id="test-result-note" rows="4" placeholder="Add context about this result..."{% if not user.is_authenticated %} disabled{% endif %}></textarea>
            </div>

            <div class="tp-modal-help-text">Tip: double-click any result cell to open this editor.</div>
          </form>

          <div id="update-result-modal-error" class="alert alert-danger py-2" style="display:none;">
            <p class="mb-0">Unable to load result...</p>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        <button type="button" data-test-result-id="undefined" id="update-result-modal-accept" class="btn btn-primary">Save changes</button>
      </div>
    </div>
  </div>
</div>
<script src="https://code.jquery.com/jquery-3.6.0.min.js" crossorigin="anonymous"></script>
<script src="{% static 'testportal/js/update_test_result_modal.js' %}"></script>
